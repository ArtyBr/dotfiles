# Tmux Configuration (Clean & Minimal)
# Aesthetic: Simple & Functional

# Change prefix to C-a
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Default Shell
set -g default-shell /usr/bin/zsh

# Quality of Life
set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 10000

# Neovim compatibility
set-option -sg escape-time 10
set-option -g focus-events on

# Fix Terminal Colors
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",xterm-kitty:RGB"

# Vim-style pane switching
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# --- Simple Status Line ---
set -g status-style "bg=default,fg=#bd93f9"
set -g status-left "#[fg=#282a36,bg=#bd93f9,bold] #S #[bg=default,fg=#bd93f9] "
set -g status-left-length 20

set -g window-status-current-format "#[fg=#282a36,bg=#bd93f9,bold] #I:#W#F "
set -g window-status-current-style "fg=#282a36,bg=#bd93f9,bold"
set -g window-status-format " #I:#W#F "
set -g window-status-style "fg=#6272a4"

# Pane borders
set -g pane-border-style "fg=#44475a"
set -g pane-active-border-style "fg=#bd93f9"

set -g status-right "#[fg=#bd93f9]#[fg=#282a36,bg=#bd93f9,bold] %H:%M "
set -g status-right-length 20

# TPM Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Initialize TPM
run '~/.config/tmux/plugins/tpm/tpm'
