# Tmux Configuration (Power User)
# Aesthetic: Hybrid Tokyo Night / Dracula

# Change prefix to C-a
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Default Shell
set -g default-shell /usr/bin/zsh

# Quality of Life
set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 10000

# Neovim compatibility
set-option -sg escape-time 10
set-option -g focus-events on

# Fix Terminal Colors
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",xterm-kitty:RGB"

# Vim-style pane switching
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Status Line (Dracula)
set -g status-style "bg=#282a36,fg=#f8f8f2"
set -g status-left-length 30
set -g status-left "#[bg=#bd93f9,fg=#282a36,bold] #S #[bg=#282a36,fg=#bd93f9]"
set -g window-status-current-format "#[bg=#44475a,fg=#282a36]#[fg=#f8f8f2,bold] #I #W #[bg=#282a36,fg=#44475a]"
set -g window-status-format "  #I #W  "
set -g status-right "#[fg=#6272a4]#[bg=#6272a4,fg=#f8f8f2] %H:%M #[fg=#bd93f9]#[bg=#bd93f9,fg=#282a36,bold] #H "

# TPM Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Initialize TPM
run '~/.tmux/plugins/tpm/tpm'
