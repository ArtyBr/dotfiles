# Kitty Configuration
# Dracula Theme (Matches AwesomeWM)

# Font Configuration
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0

# Window Layout
window_padding_width 12
confirm_os_window_close 0

# Cursor
cursor_shape          beam
cursor_blink_interval 0.5

# Transparency
background_opacity 0.9
background_blur    1

# Colors (Dracula)
background            #282a36
foreground            #f8f8f2
selection_background  #44475a
selection_foreground  #f8f8f2
url_color             #8be9fd
cursor                #bd93f9

# Tabs
active_tab_background   #bd93f9
active_tab_foreground   #282a36
inactive_tab_background #44475a
inactive_tab_foreground #6272a4
tab_bar_background      #282a36

# Normal Colors
color0 #21222c
color1 #ff5555
color2 #50fa7b
color3 #f1fa8c
color4 #bd93f9
color5 #ff79c6
color6 #8be9fd
color7 #f8f8f2

# Bright Colors
color8  #6272a4
color9  #ff6e6e
color10 #69ff94
color11 #ffffa5
color12 #d6acff
color13 #ff92df
color14 #a4ffff
color15 #ffffff

# Keybindings
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
copy_on_select yes
enable_audio_bell no
